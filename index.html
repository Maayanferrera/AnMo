<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>עיסוי לאירועי חברה | חווית ספא אצלכם</title>
    <script>
      // Workaround for "Cannot set property fetch of #<Window> which has only a getter"
      try {
        const desc = Object.getOwnPropertyDescriptor(window, 'fetch');
        if (desc && !desc.set && desc.configurable) {
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: desc.get || (() => desc.value),
            set: () => { console.warn('Ignored attempt to override window.fetch'); }
          });
        }
      } catch (e) {
        console.error('Failed to patch window.fetch', e);
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body class="font-assistant bg-stone-50 text-stone-900 overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
